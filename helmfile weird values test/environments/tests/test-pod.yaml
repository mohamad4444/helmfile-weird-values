apiVersion: v1
kind: Pod
metadata:
  name: message-broker-test-pod
  namespace: purchase-app
spec:
  containers:
  - name: tester
    image: appropriate/curl
    command:
    - sh
    - -c
    - |
      echo "Testing connectivity to message-broker-service..."

      echo "Testing core port 61616:"
      if nc -zv message-broker-service 61616 -w 5; then
        echo "✅ Core port 61616 accessible"
      else
        echo "❌ Core port 61616 inaccessible"
      fi

      echo "Testing web console port 8161:"
      STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://message-broker-service:8161)
      if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "302" ]; then
        echo "✅ Web console port 8161 accessible (HTTP status: $STATUS)"
      else
        echo "❌ Web console port 8161 inaccessible (HTTP status: $STATUS)"
      fi

      sleep 300
  restartPolicy: Never
