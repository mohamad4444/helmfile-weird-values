# values/prod.yaml
globals:
  # Global values that apply to all releases
  commonSetting: "global-prod-value"
  environment: prod

frontend:
  replicaCount: 5
  image:
    pullPolicy: IfNotPresent
  foo: "prod-bar"

keycloak:
  # Keycloak-specific prod values
  auth:
    enabled: true
  service:
    type: LoadBalancer
