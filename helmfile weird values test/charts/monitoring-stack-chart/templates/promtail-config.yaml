apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: info

    positions:
      filename: /positions/positions.yaml

    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
        batchwait: 1s
        batchsize: 1048576
        timeout: 10s

    scrape_configs:

    # ------------------------------------------------------------------------------
    # 1. Pod & container logs
    # ------------------------------------------------------------------------------
    - job_name: kubernetes-pods
      kubernetes_sd_configs:
        - role: pod
        refresh_interval: 5m
      pipeline_stages:
        - cri: {}
        # Add this drop stage to filter "no such file" errors
        - drop:
            source: filename
            expression: ".*no such file or directory.*"
            drop_counter_reason: "file_not_found"
      relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - action: replace
          source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - action: replace
          source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - action: replace
          source_labels: [__meta_kubernetes_pod_container_name]
          target_label: container
        - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
          target_label: __path__
          replacement: /var/log/pods/*$1/*.log
          separator: '/'

    # ------------------------------------------------------------------------------
    # 2. Node/system logs
    # ------------------------------------------------------------------------------
    - job_name: node-logs
      static_configs:
        - targets:
            - localhost
          labels:
            job: node-logs
            host: ${HOSTNAME}
            __path__: /var/log/*.log

    # ------------------------------------------------------------------------------
    # 3. Audit logs
    # ------------------------------------------------------------------------------
    - job_name: audit-logs
      static_configs:
        - targets:
            - localhost
          labels:
            job: audit-logs
            host: ${HOSTNAME}
            __path__: /var/log/kubernetes/audit/*.log

    # ------------------------------------------------------------------------------
    # 4. Ingress controller logs
    # ------------------------------------------------------------------------------
    - job_name: ingress-controller
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_label_app_kubernetes_io_name]
          action: keep
          regex: (ingress-nginx);controller
        - action: replace
          source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - action: replace
          source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - action: replace
          source_labels: [__meta_kubernetes_pod_container_name]
          target_label: container
        - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
          target_label: __path__
          replacement: /var/log/pods/*$1/*.log
          separator: '/'