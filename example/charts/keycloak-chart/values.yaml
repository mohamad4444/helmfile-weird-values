# Global settings
namespace: purchase-app

# Database settings
postgres:
  image: postgres:17.5
  dbName: keycloakdb
  username: keycloak
  password: keycloakpassword
  storage: 1Gi
  storageClass: ""

# Keycloak settings
keycloak:
  image: localhost:5000/keycloak:latest
  adminUser: admin
  adminPassword: adminpassword
  httpRelativePath: /
  proxyHeaders: xforwarded
  hostnameStrict: false
  proxyAddressForwarding: true # required for ingress
  proxyMode: edge # edge/reencrypt recommended behind ingress
  frontendUrl: https://keycloak.local # update from localhost

  # Service settings
  service:
    type: ClusterIP # Internal service (let ingress expose it)
    port: 8080
    nodePort: null # not needed if using ingress

# Ingress settings
ingress:
  enabled: true
  host: keycloak.local
  paths:
  - /
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "false" # keep HTTP for now

# Deployment settings
replicaCount: 1
