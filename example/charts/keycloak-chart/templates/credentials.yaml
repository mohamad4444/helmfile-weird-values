apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-cert
  namespace: purchase-app
spec:
  secretName: keycloak-tls
  issuerRef:
    name: my-ca-issuer   # must match your ClusterIssuer or Issuer
    kind: ClusterIssuer  # or Issuer if namespaced
  commonName: keycloak.local
  dnsNames:
  - keycloak.local