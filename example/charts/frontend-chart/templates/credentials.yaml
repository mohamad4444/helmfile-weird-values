apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: frontend-cert
  namespace: purchase-app
spec:
  secretName: frontend-tls
  issuerRef:
    name: my-ca-issuer   # must match your ClusterIssuer or Issuer
    kind: ClusterIssuer  # or Issuer if namespaced
  commonName: frontend.local
  dnsNames:
  - frontend.local