# Global values
global:
  namespace: default

# Artemis application settings
artemis:
  # Image settings
  image:
    repository: localhost:5000/artemis
    tag: latest
    pullPolicy: IfNotPresent
  # Replica count
  replicas: 1

  # Port configuration
  ports:
    core: 61616
    web: 8161

  # Service configuration
  service:
    type: ClusterIP
    ports:
    - name: core
      port: 61616
      targetPort: 61616
    - name: web
      port: 8161
      targetPort: 8161

  # Security configuration
  security:
    username: artemis
    password: artemis
    existingConfigMap: false # Add this
    existingSecret: false # Add this
    anonymousLogin: "false"

  # Storage configuration
  storage:
    enabled: true
    size: 1Gi
    accessModes: [ "ReadWriteOnce" ]
    storageClass: ""
    mountPath: /var/lib/artemis-instance

  # Liveness probe configuration
  livenessProbe:
    enabled: true
    port: 61616
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 1
    failureThreshold: 3

# Resource limits
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"
