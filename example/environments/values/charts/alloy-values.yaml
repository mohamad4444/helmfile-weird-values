# values/alloy-values.yaml
alloy:
  image:
    repository: grafana/alloy
    tag: latest
    pullPolicy: IfNotPresent

  configMap:
    create: true
    content: |
      // Loki write endpoint configuration - points to Loki service
      loki.write "default" {
        endpoint {
          url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      // System logs collection
      local.file_match "node_logs" {
        path_targets = [{
          __path__  = "/var/log/syslog",
          job       = "node/syslog",
          node_name = constants.hostname,
          cluster   = "my-cluster",
        },{
          __path__  = "/var/log/auth.log",
          job       = "node/auth",
          node_name = constants.hostname,
          cluster   = "my-cluster",
        }]
      }

      loki.source.file "node_logs" {
        targets    = local.file_match.node_logs.targets
        forward_to = [loki.write.default.receiver]
      }

      // Pod logs collection via Kubernetes API
      discovery.kubernetes "pod" {
        role = "pod"
        selectors {
          role = "pod"
          field = "spec.nodeName=" + constants.hostname
        }
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pod.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          action = "replace"
          target_label = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          action = "replace"
          target_label = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          action = "replace"
          target_label = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          action = "replace"
          target_label = "app"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
          action = "replace"
          target_label = "job"
          separator = "/"
        }
      }

      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pod_logs.receiver]
      }

      loki.process "pod_logs" {
        stage.static_labels {
          values = {
            cluster = "my-cluster",
            component = "alloy",
          }
        }
        forward_to = [loki.write.default.receiver]
      }

      // Kubernetes events collection
      loki.source.kubernetes_events "cluster_events" {
        job_name   = "integrations/kubernetes/eventhandler"
        log_format = "logfmt"
        forward_to = [loki.process.cluster_events.receiver]
      }

      loki.process "cluster_events" {
        forward_to = [loki.write.default.receiver]
        stage.static_labels {
          values = {
            cluster = "my-cluster",
            component = "events",
          }
        }
      }

  # RBAC configuration
  rbac:
    create: true
    rules:
    - apiGroups: [ "" ]
      resources: [ "pods", "events", "nodes" ]
      verbs: [ "get", "list", "watch" ]
    - apiGroups: [ "apps" ]
      resources: [ "replicasets", "daemonsets", "statefulsets" ]
      verbs: [ "get", "list", "watch" ]

  serviceAccount:
    create: true
    name: alloy-log-collector

  # Volume mounts for system logs
  volumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

  volumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

# Run as DaemonSet on each node
daemonset:
  enabled: true

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

service:
  enabled: false
